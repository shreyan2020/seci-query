
services:
  # Ollama LLM service
  ollama:
    image: ollama/ollama:0.1.44
    container_name: dsm-ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: ["gpu"]
              count: all
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    environment:
      - NVIDIA_VISIBLE_DEVICES=all

  # Backend FastAPI service
  backend:
    image: shreyansure8/dsm-backend:latest

    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dsm-backend
    expose:
      - "8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_URL=http://ollama:11434
      - DATABASE_PATH=/data/dsm.db
      - ARTIFACT_ROOT=/data/artifacts
      - PERSONA_ROOT=/data/personas
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost,http://127.0.0.1,http://localhost:3000,http://127.0.0.1:3000}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:7b-instruct}
      - PYTHONUNBUFFERED=1
    depends_on:
      - ollama
    volumes:
      - dsm_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: dsm-worker
    command: python worker_runner.py
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_URL=http://ollama:11434
      - DATABASE_PATH=/data/dsm.db
      - ARTIFACT_ROOT=/data/artifacts
      - PERSONA_ROOT=/data/personas
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:7b-instruct}
      - WORKER_POLL_SECONDS=2
      - RENDER_TIMEOUT_SECONDS=180
      - PYTHONUNBUFFERED=1
    depends_on:
      - backend
      - ollama
    volumes:
      - dsm_data:/data
    restart: unless-stopped

  # Frontend Next.js service
  frontend:
    image: shreyansure8/dsm-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/}
        NEXT_PUBLIC_API_PORT: ${NEXT_PUBLIC_API_PORT:-}
    container_name: dsm-frontend
    expose:
      - "3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-/}
      - NEXT_PUBLIC_API_PORT=${NEXT_PUBLIC_API_PORT:-}
      - NODE_ENV=production
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # Public reverse proxy
  nginx:
    image: nginx:1.27-alpine
    container_name: dsm-nginx
    ports:
      - "${NGINX_BIND:-0.0.0.0}:${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    restart: unless-stopped

volumes:
  ollama_data:
    driver: local
  dsm_data:
    driver: local

networks:
  default:
    name: dsm-network
