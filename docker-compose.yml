
services:
  # Ollama LLM service
  ollama:
    image: ollama/ollama:0.1.44
    container_name: dsm-ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: ["gpu"]
              count: all
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    environment:
      - NVIDIA_VISIBLE_DEVICES=all

  # Backend FastAPI service
  backend:
    image: shreyansure8/dsm-backend:latest

    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dsm-backend
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_URL=http://ollama:11434
      - DATABASE_PATH=/data/dsm.db
      - ARTIFACT_ROOT=/data/artifacts
      - PERSONA_ROOT=/data/personas
      - PYTHONUNBUFFERED=1
    depends_on:
      - ollama
    volumes:
      - dsm_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: dsm-worker
    command: python worker_runner.py
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_URL=http://ollama:11434
      - DATABASE_PATH=/data/dsm.db
      - ARTIFACT_ROOT=/data/artifacts
      - PERSONA_ROOT=/data/personas
      - WORKER_POLL_SECONDS=2
      - RENDER_TIMEOUT_SECONDS=180
      - PYTHONUNBUFFERED=1
    depends_on:
      - backend
      - ollama
    volumes:
      - dsm_data:/data
    restart: unless-stopped

  # Frontend Next.js service
  frontend:
    image: shreyansure8/dsm-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    container_name: dsm-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NODE_ENV=production
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

volumes:
  ollama_data:
    driver: local
  dsm_data:
    driver: local

networks:
  default:
    name: dsm-network
